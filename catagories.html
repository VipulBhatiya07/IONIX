<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Categories — IONIX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <style>
    :root{--brand:#0d6efd;--muted:#6c757d;--card:#ffffff}
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial; background:#f5f7fb; margin:0;color:#111}
    .page-hero{background:linear-gradient(135deg, rgba(13,110,253,0.06), rgba(118,75,162,0.03)); padding:3.5rem 0}
    .page-hero h1{font-weight:700;margin-bottom:.25rem}
    .page-hero p{color:#586076}
    .cats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.25rem;margin-top:1.25rem}
    .cat-card{background:var(--card);border-radius:12px;padding:1.25rem;border:1px solid rgba(13,110,253,0.04);box-shadow:0 8px 24px rgba(13,110,253,0.04);transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;height:100%}
    .cat-card:hover{transform:translateY(-6px);box-shadow:0 14px 36px rgba(13,110,253,0.08)}
    .cat-media{width:72px;height:72px;border-radius:12px;background:linear-gradient(135deg,var(--brand),#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;flex-shrink:0}
    .cat-body{display:flex;gap:12px;align-items:center}
    .cat-title{font-weight:700;margin-bottom:4px}
    .cat-sub{color:var(--muted);font-size:.95rem}
    .cat-meta{margin-top:auto;display:flex;justify-content:space-between;align-items:center}
    .view-btn{background:transparent;border:0;color:var(--brand);font-weight:600;padding:0}
    .search-row{display:flex;gap:10px;align-items:center}
    #site-nav .navbar-nav { display:flex; gap:0.75rem; align-items:center; }
    #site-nav .nav-item .btn.btn-primary { margin-right: 0.4rem; }
    #userMenuContainer { margin-left: 0.4rem; }
    .btn { border-radius:10px; transition: transform .12s, box-shadow .12s; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
    .btn:hover, .btn:focus { transform:translateY(-3px); box-shadow:0 10px 24px rgba(13,110,253,0.12); }
    .btn-primary { background-image: linear-gradient(90deg, var(--bs-primary,#0d6efd), #4b8af7); border: none; }
    .btn-outline-primary { border-width:1px; }
    @media (max-width:576px){ .page-hero{padding:2rem 0} }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- Navbar (injected from index) -->
  <div id="nav-placeholder"></div>
  <script>
  (async function insertNavWithTransitions(){
    try{
      const res = await fetch('/index.html');
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html,'text/html');
      const nav = doc.getElementById('site-nav');
      if(!nav) return;
      const clone = nav.cloneNode(true);
      const placeholder = document.getElementById('nav-placeholder');
      placeholder.replaceWith(clone);

      if(window.renderUser) setTimeout(()=>{ try{ window.renderUser(); }catch(e){} }, 60);
      else { const c = clone.querySelector('#userMenuContainer'); if(c) c.innerHTML = '<a class="nav-link" href="login.html">Login</a>'; }

      document.body.style.transition = document.body.style.transition || 'opacity .35s ease';
      document.body.style.opacity = 0;
      requestAnimationFrame(()=> document.body.style.opacity = 1);

      function setActiveNav(root){
        const links = Array.from(root.querySelectorAll('a'));
        function norm(p){ return (p||'').replace(/\/+$/,'')||'/'; }
        const cur = norm(location.pathname);
        links.forEach(a=>{
          a.classList.remove('active');
          try{
            const href = a.getAttribute('href')||'';
            if(href.startsWith('#')) return;
            const u = new URL(href, location.href);
            const p = norm(u.pathname);
            if(p===cur || (cur==='/' && p==='/index.html')) a.classList.add('active');
          }catch(e){}
        });
      }
      setActiveNav(clone);

      function isExternal(href){ try{ const u=new URL(href, location.href); return u.origin !== location.origin; }catch(e){ return false; } }
      clone.querySelectorAll('a').forEach(a=>{
        const href = a.getAttribute('href')||'';
        if(a.target === '_blank' || href.startsWith('mailto:') || href.startsWith('tel:') || isExternal(href)) return;
        a.addEventListener('click', (ev)=>{
          if(href.startsWith('#')){ ev.preventDefault(); const id=href.slice(1); const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth'}); return; }
          ev.preventDefault();
          document.body.style.opacity = 0;
          setTimeout(()=> window.location.href = href, 320);
        });
      });
    }catch(e){ console.error('Failed to load site nav', e); }
  })();
  </script>

  <!-- Hero -->
  <header class="page-hero">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-8">
          <h1>Shop by category</h1>
          <p class="lead">Curated collections of phones, laptops, accessories and wearables — handpicked for performance and value.</p>
        </div>
        <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
          <a href="product.html" class="btn btn-outline-primary">Browse full catalog</a>
          <a href="contact.html" class="btn btn-primary ms-2">Need help?</a>
        </div>
      </div>
    </div>
  </header>

  <main id="main" class="py-5">
    <div class="container">
      <div class="row mb-3 align-items-center">
        <div class="col-md-6">
          <div class="search-row">
            <input id="catGlobalSearch" class="form-control" placeholder="Search categories or products…" aria-label="Search categories">
            <button id="catClear" class="btn btn-outline-secondary">Clear</button>
          </div>
        </div>
        <div class="col-md-6 text-md-end mt-2 mt-md-0">
          <small class="text-muted">Showing categories powered by curated catalog</small>
        </div>
      </div>

      <!-- Categories grid -->
      <div id="catsWrap" class="cats-grid">
        <!-- cards rendered by JS -->
      </div>

      <!-- Category detail (light panel) -->
      <div id="catDetailPanel" class="card mt-4 p-3" style="display:none;border-radius:12px;border:1px solid rgba(13,110,253,0.04)">
        <div class="d-flex align-items-start justify-content-between">
          <div>
            <h4 id="catDetailTitle" class="mb-1"></h4>
            <div id="catDetailSubtitle" class="text-muted"></div>
          </div>
          <div>
            <button id="closeCatDetail" class="btn btn-outline-secondary">Close</button>
          </div>
        </div>

        <div id="catProducts" class="row g-3 mt-3">
          <!-- product cards -->
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center">
    <div class="container">
      <small class="text-muted">© 2025 IONIX — All rights reserved.</small>
    </div>
  </footer>

  <!-- user widget renderer (kept same pattern as other pages) -->
  <script>
  (function(){
    const USER_KEY='ionix_user_v1';
    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function firstName(n){ return (n||'').split(' ')[0] || n || 'Account'; }
    function renderUser(){ const c=document.getElementById('userMenuContainer'); if(!c) return; const u=JSON.parse(localStorage.getItem(USER_KEY)||'null'); if(u){ c.innerHTML = `<div id="userWidget" class="position-relative d-inline-block"><button id="userBtn" class="btn btn-outline-primary">${escapeHtml(firstName(u.name))}</button><div id="userDropdown" style="display:none;position:absolute;right:0;top:38px;min-width:180px;z-index:2000;" class="card p-2"><div class="small text-muted">Signed in as <strong>${escapeHtml(u.name)}</strong></div><hr class="my-2"><a class="d-block py-1" href="product.html">My Orders</a><a class="d-block py-1" href="contact.html">Support</a><button id="logoutBtn" class="btn btn-link p-0 mt-2">Logout</button></div></div>`; const btn=document.getElementById('userBtn'), dd=document.getElementById('userDropdown'); btn.addEventListener('click', ()=> dd.style.display = dd.style.display === 'none' ? 'block' : 'none'); document.addEventListener('click', (e)=> { if(!document.getElementById('userWidget')?.contains(e.target)) dd.style.display='none'; }); document.getElementById('logoutBtn')?.addEventListener('click', ()=>{ localStorage.removeItem(USER_KEY); renderUser(); }); } else c.innerHTML = `<a class="nav-link" href="login.html">Login</a>`; }
    document.addEventListener('DOMContentLoaded', renderUser);
    window.renderUser = renderUser;
  })();
  </script>

  <!-- Dynamic categories renderer (keeps API + fallback behaviour, adapted to new DOM) -->
  <script>
  (async function(){
    const wrap = document.getElementById('catsWrap');
    const detailPanel = document.getElementById('catDetailPanel');
    const detailTitle = document.getElementById('catDetailTitle');
    const detailSubtitle = document.getElementById('catDetailSubtitle');
    const catProducts = document.getElementById('catProducts');
    const searchInput = document.getElementById('catGlobalSearch');
    const clearBtn = document.getElementById('catClear');
    const closeDetail = document.getElementById('closeCatDetail');

    let catalog = [];
    let categories = [];

    async function loadApi(){
      try{
        const [pRes,cRes] = await Promise.all([fetch('/api/products'), fetch('/api/categories')]);
        if(!pRes.ok || !cRes.ok) throw new Error('no api');
        catalog = await pRes.json();
        const cats = await cRes.json();
        categories = Array.isArray(cats) ? cats.map(c=>c.name||c.slug) : Array.from(new Set(catalog.map(p=>p.category||'Uncategorized')));
        return true;
      }catch(e){ return false; }
    }

    function fallback(){
      catalog = [
        { id:'flagship-smartphone-x', title:'Flagship Smartphone X', category:'Smartphones', price:79999, rating:5, img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=800&q=60' },
        { id:'ultrabook-pro-14', title:'Ultrabook Pro 14"', category:'Laptops', price:119999, rating:4, img:'image/body/ultrabook.jpg' },
        { id:'wireless-earbuds', title:'Wireless Earbuds', category:'Accessories', price:12999, rating:5, img:'image/body/wireless_earbuds.jpg' },
        { id:'smartwatch-series-7', title:'Smartwatch Series 7', category:'Wearables', price:24999, rating:4, img:'image/body/watch_7series.webp' }
      ];
      categories = Array.from(new Set(catalog.map(p=>p.category||'Uncategorized')));
    }

    function thumbFor(cat){
      switch(cat){ case 'Smartphones': return 'image/body/smartphone.webp'; case 'Laptops': return 'image/body/laptop.jpg'; case 'Accessories': return 'image/body/accessories.jpg'; case 'Wearables': return 'image/body/smartwatches.jpg'; default: return 'image/body/smartphone.webp'; }
    }

    function renderCards(filter=''){
      wrap.innerHTML = '';
      const q = (filter||'').toLowerCase();
      const visibleCats = categories.filter(c=> c.toLowerCase().includes(q) || catalog.some(p=> (p.category||'').toLowerCase()===c.toLowerCase() && (p.title||'').toLowerCase().includes(q) ));
      if(visibleCats.length===0){ wrap.innerHTML = '<div class="text-muted">No categories found.</div>'; return; }
      visibleCats.forEach(cat=>{
        const count = catalog.filter(p=> (p.category||'')===cat ).length;
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.innerHTML = `<div class="cat-body">
          <div class="cat-media" aria-hidden="true"><img src="${thumbFor(cat)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px"></div>
          <div style="flex:1">
            <div class="cat-title">${cat}</div>
            <div class="cat-sub">${count} product${count!==1?'s':''} • Curated selection</div>
            <div class="cat-meta"><button class="view-btn" data-cat="${encodeURIComponent(cat)}">View products →</button><span class="text-muted small">Popular</span></div>
          </div>
        </div>`;
        wrap.appendChild(card);
      });
      // attach listeners
      wrap.querySelectorAll('.view-btn').forEach(b=>{
        b.addEventListener('click', ()=> openCategory(decodeURIComponent(b.dataset.cat)));
      });
    }

    function openCategory(cat){
      const items = catalog.filter(p=> (p.category||'')===cat );
      detailTitle.textContent = cat;
      detailSubtitle.textContent = `${items.length} product${items.length!==1?'s':''}`;
      catProducts.innerHTML = items.length ? items.map(p=>`<div class="col-12 col-md-6 col-lg-4"><div class="card h-100"><img src="${p.img||thumbFor(cat)}" class="card-img-top" alt="${p.title}" style="height:160px;object-fit:cover"><div class="card-body d-flex flex-column"><h6 class="mb-1">${p.title}</h6><div class="text-muted small mb-2">${'★'.repeat(p.rating||4)}</div><div class="fw-semibold mb-2">₹${(p.price||0).toLocaleString('en-IN')}</div><div class="mt-auto d-grid gap-2"><a href="PRODUCT-DETAIL.HTML?id=${encodeURIComponent(p.id)}" class="btn btn-primary btn-sm">View</a></div></div></div></div>`).join('') : '<div class="col-12 text-muted">No products in this category.</div>';
      detailPanel.style.display = '';
      detailPanel.scrollIntoView({behavior:'smooth',block:'center'});
    }

    closeDetail.addEventListener('click', ()=>{ detailPanel.style.display='none'; });

    searchInput.addEventListener('input', ()=> renderCards(searchInput.value));
    clearBtn.addEventListener('click', ()=>{ searchInput.value=''; renderCards(''); });

    // boot
    const ok = await loadApi().catch(()=>false);
    if(!ok) fallback();
    renderCards('');
  })();
  </script>
</body>
</html>
